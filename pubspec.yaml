name: app_pap_respiracion
description: "Ancla - Primer auxilio psicológico y respiración guiada para el bienestar emocional."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.10.5
  audio_service: ^0.18.18
  firebase_analytics: ^12.0.0
  firebase_core: ^4.0.0
  firebase_crashlytics: ^5.0.0
  firebase_auth: ^6.0.0
  google_sign_in: ^6.2.0
  firebase_storage: ^13.0.0
  cloud_firestore: ^6.1.3
  google_fonts: ^6.2.1
  shared_preferences: ^2.5.3
  wakelock_plus: ^1.3.4
  share_plus: ^10.0.0
  path_provider: ^2.1.0
  url_launcher: ^6.2.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  just_audio_platform_interface: ^4.5.1
  path_provider_platform_interface: ^2.1.2
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/audio/
    - assets/audio/ambience/
    - assets/audio/tones/
    - assets/images/covers/
    - assets/covers/pilot_harmonia/
